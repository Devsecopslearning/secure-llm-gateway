<!DOCTYPE html>
<html>
<head>
    <title>Secure LLM Gateway</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        textarea { width: 100%; height: 100px; }
        .response { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔒 Secure LLM Gateway</h1>
    <form id="queryForm">
        <label>Prompt:</label><br>
        <textarea id="prompt"></textarea><br>
        <button type="submit">Send</button>
    </form>
    <div class="response" id="response"></div>

    <script>
        document.getElementById("queryForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const prompt = document.getElementById("prompt").value;
            const res = await fetch("/secure-query", {
                method: "POST",
                headers: {
                    "X-API-Key": "mysecretkey",
                    "X-User-Role": "admin",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ user: "atish", prompt: prompt })
            });
            const data = await res.json();
            document.getElementById("response").innerText = data.response || data.error;
        });
    </script>
</body>
</html>
