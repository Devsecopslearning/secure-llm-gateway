<!DOCTYPE html>
<html>
<head>
    <title>Secure LLM Gateway</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        textarea { width: 100%; height: 100px; }
        .response { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 10px 20px; margin-top: 10px; }
        .login-form { border: 1px solid #ccc; padding: 20px; width: 300px; margin-bottom: 20px; }
        .query-form { display: none; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; margin: 5px 0; }
        .user-info { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>🔒 Secure LLM Gateway</h1>
    
    <!-- Login Form -->
    <div id="loginSection" class="login-form">
        <h2>Login</h2>
        <div id="loginMessage"></div>
        <form id="loginForm">
            <label>Username:</label><br>
            <input type="text" id="username" placeholder="admin or auditor" required><br>
            <label>Password:</label><br>
            <input type="password" id="password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Query Form (shown after login) -->
    <div id="querySection" class="query-form">
        <div class="user-info">
            <p>Logged in as: <strong id="currentUser"></strong> (<span id="currentRole"></span>)</p>
            <button type="button" onclick="logout()">Logout</button>
        </div>
        
        <h2>Query LLaMA3</h2>
        <form id="queryForm">
            <label>Prompt:</label><br>
            <textarea id="prompt"></textarea><br>
            <button type="submit">Send</button>
        </form>
        <div class="response" id="response"></div>
    </div>

    <script>
        // Handle login
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            
            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById("loginMessage").innerHTML = '<p class="success">Login successful!</p>';
                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("querySection").style.display = "block";
                    document.getElementById("currentUser").innerText = data.username;
                    document.getElementById("currentRole").innerText = data.role;
                } else {
                    document.getElementById("loginMessage").innerHTML = '<p class="error">' + data.error + '</p>';
                }
            } catch (error) {
                document.getElementById("loginMessage").innerHTML = '<p class="error">Error: ' + error + '</p>';
            }
        });
        
        // Handle query submission
        document.getElementById("queryForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const prompt = document.getElementById("prompt").value;
            
            try {
                const res = await fetch("/secure-query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById("response").innerText = data.response;
                } else {
                    document.getElementById("response").innerHTML = '<p class="error">' + data.error + '</p>';
                }
            } catch (error) {
                document.getElementById("response").innerHTML = '<p class="error">Error: ' + error + '</p>';
            }
        });
        
        // Handle logout
        async function logout() {
            await fetch("/logout", { method: "POST" });
            document.getElementById("loginSection").style.display = "block";
            document.getElementById("querySection").style.display = "none";
            document.getElementById("loginForm").reset();
            document.getElementById("loginMessage").innerHTML = '';
        }
    </script>
</body>
</html>
